<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game | Ethan Abbott</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(145deg, #154360 0%, #2980b9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 1.5rem 1rem 2.5rem;
        }

        /* ── Top bar ── */
        .top-bar {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .back-link {
            color: #aed6f1;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: #fff; }

        .page-label {
            color: #d6eaf8;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* ── Card ── */
        .card {
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 14px 50px rgba(0,0,0,0.32);
            max-width: 500px;
            width: 100%;
            padding: 1.4rem 1.4rem 1.6rem;
        }

        /* ── Header row ── */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .game-title {
            font-size: 1.45rem;
            font-weight: 700;
            color: #154360;
        }

        .score-row {
            display: flex;
            gap: 1.4rem;
        }

        .score-box {
            text-align: center;
        }

        .score-lbl {
            display: block;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #85c1e9;
        }

        .score-val {
            display: block;
            font-size: 1.5rem;
            font-weight: 700;
            color: #154360;
            line-height: 1.1;
            min-width: 2ch;
        }

        /* ── Canvas wrapper ── */
        .canvas-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #aed6f1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ── Overlay ── */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(21, 67, 96, 0.93);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 9px;
            color: #fff;
            gap: 0.7rem;
            padding: 1.5rem;
            text-align: center;
        }

        .overlay-emoji  { font-size: 3rem; line-height: 1; }
        .overlay-title  { font-size: 1.75rem; font-weight: 700; line-height: 1.2; }
        .overlay-sub    { font-size: 0.92rem; color: #aed6f1; line-height: 1.4; }

        .overlay-btn {
            background: #ffffff;
            color: #154360;
            border: none;
            padding: 0.6rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.18s, transform 0.15s;
            font-family: 'Segoe UI', sans-serif;
        }
        .overlay-btn:hover { background: #aed6f1; transform: scale(1.04); }

        /* ── Speed indicator ── */
        .speed-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.75rem;
            font-size: 0.82rem;
            color: #7fb3d3;
        }

        .speed-pips {
            display: flex;
            gap: 4px;
        }

        .pip {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d6eaf8;
            transition: background 0.3s;
        }

        .pip.active { background: #2980b9; }

        /* ── D-pad (mobile) ── */
        .dpad {
            display: grid;
            grid-template-areas: ". up ." "left . right" ". down .";
            gap: 4px;
            margin: 1rem auto 0;
            width: fit-content;
        }

        .dpad-btn {
            width: 52px;
            height: 52px;
            background: #eaf4fb;
            border: 2px solid #aed6f1;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .dpad-btn:active { background: #2980b9; color: #fff; border-color: #2980b9; }
        .dpad-up    { grid-area: up;    }
        .dpad-left  { grid-area: left;  }
        .dpad-right { grid-area: right; }
        .dpad-down  { grid-area: down;  }

        @media (min-width: 600px) {
            .dpad { display: none; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="scratch.html" class="back-link">&#8592; Back to Basketball Page</a>
        <span class="page-label">Ethan Abbott</span>
    </div>

    <div class="card">

        <div class="card-header">
            <div class="game-title">&#127822; Snake</div>
            <div class="score-row">
                <div class="score-box">
                    <span class="score-lbl">Score</span>
                    <span class="score-val" id="scoreVal">0</span>
                </div>
                <div class="score-box">
                    <span class="score-lbl">Best</span>
                    <span class="score-val" id="bestVal">0</span>
                </div>
            </div>
        </div>

        <div class="canvas-wrap">
            <canvas id="c" width="480" height="480"></canvas>
            <div class="overlay" id="overlay">
                <div class="overlay-emoji" id="ovEmoji">&#127822;</div>
                <div class="overlay-title" id="ovTitle">Snake</div>
                <div class="overlay-sub" id="ovSub">Arrow keys or WASD to move</div>
                <button class="overlay-btn" id="ovBtn">Start Game</button>
            </div>
        </div>

        <div class="speed-row">
            <span id="speedLbl">Speed: 1</span>
            <div class="speed-pips" id="pips">
                <div class="pip active" id="p1"></div>
                <div class="pip" id="p2"></div>
                <div class="pip" id="p3"></div>
                <div class="pip" id="p4"></div>
                <div class="pip" id="p5"></div>
            </div>
        </div>

        <!-- D-pad for touch / mobile -->
        <div class="dpad">
            <button class="dpad-btn dpad-up"    id="du">&#8679;</button>
            <button class="dpad-btn dpad-left"  id="dl">&#8678;</button>
            <button class="dpad-btn dpad-right" id="dr">&#8680;</button>
            <button class="dpad-btn dpad-down"  id="dd">&#8681;</button>
        </div>

    </div>

    <script>
    (function () {
        const canvas  = document.getElementById('c');
        const ctx     = canvas.getContext('2d');
        const W       = canvas.width;
        const GRID    = 16;
        const CELL    = W / GRID;   // 30px per cell

        // Palette
        const C = {
            bg:       '#f0f7ff',
            grid:     '#daeaf7',
            head:     '#154360',
            bodyA:    '#1f618d',
            bodyB:    '#2980b9',
            tail:     '#7fb3d3',
            apple:    '#c0392b',
            appleG:   'rgba(192,57,43,0.28)',
            eyes:     '#ffffff',
            pupil:    '#154360',
        };

        // State
        let snake, prevSnake, dir, inputQueue, food, score, best, rafId, lastMoveTime, moveProgress, state;
        best = 0;

        // ── Speed: ms per grid step ───────────────────────────────
        function speed() {
            const lvl = Math.min(4, Math.floor(score / 5));
            return 175 - lvl * 25;   // 175ms → 75ms over 5 levels
        }

        function levelNum() { return Math.min(5, Math.floor(score / 5) + 1); }

        // ── Init ──────────────────────────────────────────────────
        function init() {
            const mid = Math.floor(GRID / 2);
            snake      = [{ x: mid+1, y: mid }, { x: mid, y: mid }, { x: mid-1, y: mid }];
            prevSnake  = snake.map(s => ({ ...s }));
            dir        = { x: 1, y: 0 };
            inputQueue = [];
            score      = 0;
            state      = 'playing';
            lastMoveTime  = null;
            moveProgress  = 0;
            placeFood();
            updateUI();
            cancelAnimationFrame(rafId);
            rafId = requestAnimationFrame(gameLoop);
        }

        // ── Input queue: buffers up to 2 pending direction changes ──
        function enqueueDir(nd) {
            const ref = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : dir;
            if (nd.x === -ref.x && nd.y === -ref.y) return; // no reversing
            if (nd.x === ref.x  && nd.y === ref.y)  return; // no duplicates
            if (inputQueue.length < 2) inputQueue.push(nd);
        }

        // ── rAF loop: 60fps render + timestamp-scheduled moves ────
        function gameLoop(ts) {
            if (state !== 'playing') return;
            if (lastMoveTime === null) lastMoveTime = ts;

            const elapsed = ts - lastMoveTime;
            moveProgress = Math.min(elapsed / speed(), 1);

            if (moveProgress >= 1) {
                prevSnake    = snake.map(s => ({ ...s }));
                lastMoveTime = ts;
                moveProgress = 0;
                step();
                if (state !== 'playing') return;
            }

            draw(false, moveProgress);
            rafId = requestAnimationFrame(gameLoop);
        }

        // ── Place food ────────────────────────────────────────────
        function placeFood() {
            let pos;
            do {
                pos = { x: rnd(GRID), y: rnd(GRID) };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y));
            food = pos;
        }

        function rnd(n) { return Math.floor(Math.random() * n); }

        // ── Game step (logic only) ────────────────────────────────
        function step() {
            if (inputQueue.length > 0) dir = inputQueue.shift();

            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
                return gameOver();
            }
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                updateUI();
                placeFood();
            } else {
                snake.pop();
            }
        }

        // ── Game over ─────────────────────────────────────────────
        function gameOver() {
            cancelAnimationFrame(rafId);
            state = 'over';
            if (score > best) { best = score; document.getElementById('bestVal').textContent = best; }

            let f = 0;
            const flash = setInterval(() => {
                draw(f % 2 === 0, 1);
                if (++f >= 6) {
                    clearInterval(flash);
                    showOverlay('&#128128;', 'Game Over!',
                        'You scored ' + score + ' point' + (score !== 1 ? 's' : ''),
                        'Play Again');
                }
            }, 110);
        }

        // ── Interpolated position for segment i ───────────────────
        function ipos(i, progress) {
            const cur  = snake[i];
            const prev = prevSnake[Math.min(i, prevSnake.length - 1)];
            return {
                x: prev.x + (cur.x - prev.x) * progress,
                y: prev.y + (cur.y - prev.y) * progress
            };
        }

        // ── Draw ──────────────────────────────────────────────────
        function draw(flash = false, progress = 1) {
            ctx.clearRect(0, 0, W, W);

            // Checkered board
            for (let row = 0; row < GRID; row++) {
                for (let col = 0; col < GRID; col++) {
                    ctx.fillStyle = (row + col) % 2 === 0 ? '#daeef9' : '#c8e6f5';
                    ctx.fillRect(col * CELL, row * CELL, CELL, CELL);
                }
            }
            // Cell borders
            ctx.strokeStyle = '#b8d8ec';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID; i++) {
                ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, W); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(W, i * CELL); ctx.stroke();
            }

            // Apple glow
            ctx.fillStyle = C.appleG;
            ctx.beginPath();
            ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL * 0.85, 0, Math.PI * 2);
            ctx.fill();

            // Apple
            const ax = food.x * CELL + CELL / 2;
            const ay = food.y * CELL + CELL / 2;
            ctx.fillStyle = C.apple;
            ctx.beginPath();
            ctx.arc(ax, ay, CELL / 2 - 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#6d4c41';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(ax, ay - CELL / 2 + 1.5);
            ctx.lineTo(ax + 3, ay - CELL / 2 - 2);
            ctx.stroke();

            // Snake body — drawn tail→head using interpolated positions
            for (let i = snake.length - 1; i >= 1; i--) {
                const t   = i / (snake.length - 1);
                const pos = ipos(i, progress);
                ctx.fillStyle = flash ? '#e74c3c' : lerp3(C.tail, C.bodyB, C.bodyA, t);
                rr(pos.x * CELL + 2, pos.y * CELL + 2, CELL - 4, CELL - 4, 4);
                ctx.fill();
            }

            // Head
            const hpos = ipos(0, progress);
            const hcx  = hpos.x * CELL + CELL / 2;
            const hcy  = hpos.y * CELL + CELL / 2;
            ctx.fillStyle = flash ? '#c0392b' : C.head;
            rr(hpos.x * CELL + 1, hpos.y * CELL + 1, CELL - 2, CELL - 2, 6);
            ctx.fill();

            // Eyes
            const [e1, e2] = eyePos(hcx, hcy);
            ctx.fillStyle = C.eyes;
            ctx.beginPath(); ctx.arc(e1.x, e1.y, CELL * 0.13, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(e2.x, e2.y, CELL * 0.13, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = C.pupil;
            ctx.beginPath(); ctx.arc(e1.x + dir.x * 1.2, e1.y + dir.y * 1.2, CELL * 0.06, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(e2.x + dir.x * 1.2, e2.y + dir.y * 1.2, CELL * 0.06, 0, Math.PI * 2); ctx.fill();
        }

        // Eye positions — takes pixel centre of head
        function eyePos(cx, cy) {
            const r = CELL * 0.26;
            let ax, ay, bx, by;
            if      (dir.x ===  1) { ax = cx+r; ay = cy-r; bx = cx+r; by = cy+r; }
            else if (dir.x === -1) { ax = cx-r; ay = cy-r; bx = cx-r; by = cy+r; }
            else if (dir.y === -1) { ax = cx-r; ay = cy-r; bx = cx+r; by = cy-r; }
            else                   { ax = cx-r; ay = cy+r; bx = cx+r; by = cy+r; }
            return [{ x: ax, y: ay }, { x: bx, y: by }];
        }

        // Rounded rect
        function rr(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // 3-stop colour lerp
        function lerp3(c1, c2, c3, t) {
            const a = t < 0.5 ? lerpHex(c1, c2, t * 2) : lerpHex(c2, c3, (t - 0.5) * 2);
            return a;
        }
        function lerpHex(a, b, t) {
            const p = s => parseInt(s, 16);
            const r1 = p(a.slice(1,3)), g1 = p(a.slice(3,5)), b1 = p(a.slice(5,7));
            const r2 = p(b.slice(1,3)), g2 = p(b.slice(3,5)), b2 = p(b.slice(5,7));
            return `rgb(${~~(r1+(r2-r1)*t)},${~~(g1+(g2-g1)*t)},${~~(b1+(b2-b1)*t)})`;
        }

        // ── UI ────────────────────────────────────────────────────
        function updateUI() {
            document.getElementById('scoreVal').textContent = score;
            const lvl = levelNum();
            document.getElementById('speedLbl').textContent = 'Speed: ' + lvl;
            for (let i = 1; i <= 5; i++) {
                document.getElementById('p' + i).classList.toggle('active', i <= lvl);
            }
        }

        function showOverlay(emoji, title, sub, btnText) {
            document.getElementById('ovEmoji').innerHTML = emoji;
            document.getElementById('ovTitle').textContent = title;
            document.getElementById('ovSub').textContent   = sub;
            document.getElementById('ovBtn').textContent   = btnText;
            document.getElementById('overlay').style.display = 'flex';
        }

        function hideOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }

        // ── Controls ─────────────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (state !== 'playing') return;
            const map = {
                ArrowUp: {x:0,y:-1}, w:{x:0,y:-1}, W:{x:0,y:-1},
                ArrowDown: {x:0,y:1}, s:{x:0,y:1}, S:{x:0,y:1},
                ArrowLeft: {x:-1,y:0}, a:{x:-1,y:0}, A:{x:-1,y:0},
                ArrowRight: {x:1,y:0}, d:{x:1,y:0}, D:{x:1,y:0},
            };
            const nd = map[e.key];
            if (nd) {
                enqueueDir(nd);
                e.preventDefault();
            }
        });

        // D-pad
        function dpad(nx, ny) {
            if (state !== 'playing') return;
            enqueueDir({ x: nx, y: ny });
        }
        document.getElementById('du').addEventListener('click', () => dpad( 0, -1));
        document.getElementById('dd').addEventListener('click', () => dpad( 0,  1));
        document.getElementById('dl').addEventListener('click', () => dpad(-1,  0));
        document.getElementById('dr').addEventListener('click', () => dpad( 1,  0));

        // Start button
        document.getElementById('ovBtn').addEventListener('click', () => {
            hideOverlay();
            init();
        });

    })();
    </script>

</body>
</html>
